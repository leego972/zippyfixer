kind = "web"
previewPath = "/"
title = "ZippyFixer"
version = "1.0.0"
id = "artifacts/zippyfixer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19470

[services.development]
run = "pnpm --filter @workspace/zippyfixer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zippyfixer", "run", "build" ]
publicDir = "artifacts/zippyfixer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19470"
BASE_PATH = "/"
